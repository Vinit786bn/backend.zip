<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f172a">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta charset="UTF-8">
  <title>Carbon Wallet - Public Blockchain Verification</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { background-color: #020617; color: #e2e8f0; font-family: 'Inter', sans-serif; margin:0; padding:50px; }
    .container { max-width: 800px; margin: 0 auto; text-align:center; }
    h1 { color: #f8fafc; font-size: 2.5rem; margin-bottom:10px; }
    .search-box { background:#0f172a; border: 1px solid #1e293b; padding:15px; border-radius:8px; display:flex; margin:40px 0; }
    input { flex:1; background:transparent; border:none; color:white; outline:none; font-size:1.1rem; padding:10px; }
    button { background:#38bdf8; border:none; color:white; padding:10px 20px; font-weight:bold; border-radius:4px; cursor:pointer; }
    .ledger-block { background:#0f172a; border: 1px solid #1e293b; padding:20px; text-align:left; border-radius:8px; margin-bottom:15px; position:relative; }
    .hash { font-family:monospace; color:#38bdf8; font-size:0.8rem; word-break: break-all; }
    .prev-hash { font-family:monospace; color:#ef4444; font-size:0.75rem; word-break: break-all; margin-bottom:10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1><i class="fas fa-link" style="color:#38bdf8;"></i> CCTS Public Registry</h1>
    <p style="color:#94a3b8;">Enter a Credit ID or Certificate Hash to trace its immutable origin.</p>
    
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="e.g. CRT-1725301823" value="CRT-DEMO-100">
      <button onclick="verifyHash()"><i class="fas fa-search"></i> Verify Hash-Chain</button>
    </div>
    
    <div id="resultContainer" style="display:none; text-align:left;">
      <h3 id="integrity-status" style="color:#10b981; margin-bottom:15px; display:none;"><i class="fas fa-check-circle"></i> Chain Verified & Cryptographically Intact</h3>
      
      <div id="project-summary" style="display:none; background:#1e293b; padding:15px; border-radius:8px; margin-bottom:20px; font-size:0.9rem;">
        <div style="color:#f8fafc; font-weight:bold; margin-bottom:10px;">Project Summary</div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; color:#94a3b8;">
          <div><strong>Project Name:</strong> <span id="v-proj-name"></span></div>
          <div><strong>Owner:</strong> <span id="v-proj-owner"></span></div>
          <div><strong>Vintage:</strong> <span id="v-proj-vintage"></span></div>
        </div>
      </div>

      <div id="blocksContainer"></div>
      
      <div style="margin-top:20px; font-size:0.8rem; color:#94a3b8; border-top:1px solid #1e293b; padding-top:15px; text-align:left; display:flex; justify-content:space-between;">
        <div><strong>CCTS Interoperability Registry ID:</strong> GC-IND-2026-89A4B</div>
        <div style="color:#10b981;"><i class="fas fa-link"></i> Linked to Grid Controller of India</div>
      </div>
      <button onclick="copyShareLink()" style="margin-top:15px; background:transparent; border:1px solid #38bdf8; color:#38bdf8; width:100%;"><i class="fas fa-share-alt"></i> Copy Shareable Link</button>
    </div>

  </div>
  <script>

    async function verifyHash() {
        const input = document.getElementById('searchInput').value;
        if(!input) return;
        document.getElementById('resultContainer').style.display = 'block';
        document.getElementById('blocksContainer').innerHTML = '<p style="color:#94a3b8; text-align:center;">Querying Blockchain Ledger...</p>';
        
        try {
            const res = await fetch('/api/blockchain/verify/' + input);
            const data = await res.json();
            
            if(data.valid && data.chain && data.chain.length > 0) {
                document.getElementById('integrity-status').style.display = 'block';
                document.getElementById('project-summary').style.display = 'block';
                document.getElementById('v-proj-name').textContent = "Green Valley Project";
                document.getElementById('v-proj-owner').textContent = "Verified Farmer";
                document.getElementById('v-proj-vintage').textContent = "2026";
                
                let html = '';
                data.chain.forEach(b => {
                    html += `
                    <div class="block">
                      <div class="block-header">
                        <span class="block-index">Block #${b.index}</span>
                        <span class="block-time">${new Date(b.timestamp).toLocaleString()}</span>
                      </div>
                      <div class="block-content">
                        <div class="hash-row"><span class="hash-label">Event:</span> ${b.transaction.event_type}</div>
                        <div class="hash-row"><span class="hash-label">Hash:</span> ${b.hash}</div>
                        <div class="hash-row"><span class="hash-label">Prev:</span> ${b.previous_hash}</div>
                      </div>
                    </div>
                    `;
                });
                document.getElementById('blocksContainer').innerHTML = html;
            } else {
                document.getElementById('blocksContainer').innerHTML = '<p style="color:#ef4444; text-align:center;">Hash not found or chain invalid.</p>';
            }
        } catch(e) {
            document.getElementById('blocksContainer').innerHTML = '<p style="color:#ef4444; text-align:center;">Network error.</p>';
        }
    }
    
    function copyShareLink() {
        navigator.clipboard.writeText(window.location.href + "?id=" + document.getElementById('searchInput').value);
        alert('Verification Link Copied!');
    }
    
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        if(id) {
            document.getElementById('searchInput').value = id;
            verifyHash();
        }
    });
    
</script>
  </body>
</html>
